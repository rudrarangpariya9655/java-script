<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div class="calculator">
        <input id="input" readonly>
        <div class="buttons">
            <button onclick="DisplayToInput(7)">7</button>
            <button onclick="DisplayToInput(8)">8</button>
            <button onclick="DisplayToInput(9)">9</button>
            <button onclick="DisplayToInput('+')">+</button>
            <button onclick="DisplayToInput(4)">4</button>
            <button onclick="DisplayToInput(5)">5</button>
            <button onclick="DisplayToInput(6)">6</button>
            <button onclick="DisplayToInput('-')">-</button>
            <button onclick="DisplayToInput(1)">1</button>
            <button onclick="DisplayToInput(2)">2</button>
            <button onclick="DisplayToInput(3)">3</button>
            <button onclick="DisplayToInput('*')">*</button>
            <button onclick="DisplayToInput(0)">0</button>
            <button onclick="DisplayToInput('.')">.</button>
            <button onclick="calculate()">=</button>
            <button onclick="clearDisplay()">c</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
